<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifying — EntranceHearts 💕</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">💕 EntranceHearts</a>
    <div style="display: flex; gap: 10px; align-items: center;">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>
  <div class="verify-page">
    <div class="verify-box" id="verifyBox">
      <span class="spinner">💕</span>
      <div class="verify-title">Verifying your account...</div>
      <div class="verify-sub">Please wait while we confirm your email.</div>
    </div>
  </div>

  <script>
    async function handleVerification() {
      try {
        // Supabase puts the token in the URL hash or query string
        // Handle both formats
        const hash = window.location.hash.substring(1);
        const query = window.location.search.substring(1);
        const params = new URLSearchParams(hash || query);

        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');
        const type = params.get('type');
        const errorDesc = params.get('error_description');

        // If there's an error in the URL
        if (errorDesc) throw new Error(decodeURIComponent(errorDesc));

        let session = null;

        if (accessToken) {
          // Magic link or email confirm — set the session manually
          const { data, error } = await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken || ''
          });
          if (error) throw error;
          session = data.session;
        } else {
          // Try getting existing session
          const { data, error } = await supabaseClient.auth.getSession();
          if (error) throw error;
          session = data.session;
        }

        if (!session) throw new Error('No session found');

        const userId = session.user.id;

        // Check if profile exists, create if not
        const { data: profile } = await supabaseClient
          .from('profiles').select('id').eq('id', userId).single();

        if (!profile) {
          const tempData = localStorage.getItem('ehSignupData');
          if (tempData) {
            await supabaseClient.from('profiles').upsert({
              id: userId,
              ...JSON.parse(tempData)
            });
            localStorage.removeItem('ehSignupData');
          }
        }

        localStorage.removeItem('ehSignupEmail');
        localStorage.removeItem('ehSignupPassword');

        document.getElementById('verifyBox').innerHTML = `
          <div class="verify-emoji">🎉</div>
          <div class="verify-title" style="color:#ff6b9d">Email Verified!</div>
          <div class="verify-sub">Welcome to EntranceHearts! Redirecting you now...</div>
        `;
        setTimeout(() => window.location.href = 'browse.html', 2000);

      } catch(err) {
        document.getElementById('verifyBox').innerHTML = `
          <div class="verify-emoji">❌</div>
          <div class="verify-title">Verification Failed</div>
          <div class="verify-sub">
            ${err.message === 'No session found'
              ? 'This link has expired or already been used.'
              : (err.message || 'Something went wrong.')}
            <br/><br/>Please sign up again or use the code sent to your email.
          </div>
          <a href="signup.html" class="action-btn">Try Again</a>
        `;
      }
    }

    handleVerification();
  </script>

<script>
  function toggleTheme() {
    const html = document.documentElement;
    const currentTheme = html.getAttribute('data-theme');
    const themeToggle = document.getElementById('themeToggle');
    
    if (currentTheme === 'dark') {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      if (themeToggle) themeToggle.textContent = '🌙';
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      if (themeToggle) themeToggle.textContent = '☀️';
    }
  }
  
  const savedTheme = localStorage.getItem('theme');
  const themeToggle = document.getElementById('themeToggle');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    if (themeToggle) themeToggle.textContent = '☀️';
  } else {
    document.documentElement.removeAttribute('data-theme');
    if (themeToggle) themeToggle.textContent = '🌙';
  }
</script>

  

  
  <script>
  // Page transition effect
  document.body.classList.add('fade-in');
  
  // Add scroll effect to navbar
  window.addEventListener('scroll', function() {
    const navbar = document.querySelector('.navbar');
    if (navbar) {
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    }
  });
  </script>

  
</body>
</html>
