    .mobile-menu-btn {

    /* Main Verify Page */

    .verify-box {

      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 20, 147, 0.2);
      border-radius: 32px;
      padding: 48px 40px;
      text-align: center;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      animation: fadeInUp 0.6s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .spinner {
      font-size: 3rem;
      display: inline-block;
      margin-bottom: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .verify-emoji {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: gentleBounce 0.5s ease;
    }
    @keyframes gentleBounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .verify-title {

  <script>
    async function handleVerification() {
      try {
        const hash = window.location.hash.substring(1);
        const query = window.location.search.substring(1);
        const params = new URLSearchParams(hash || query);

        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');
        const errorDesc = params.get('error_description');

        if (errorDesc) throw new Error(decodeURIComponent(errorDesc));

        let session = null;

        if (accessToken) {
          const { data, error } = await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken || ''
          });
          if (error) throw error;
          session = data.session;
        } else {
          const { data, error } = await supabaseClient.auth.getSession();
          if (error) throw error;
          session = data.session;
        }

        if (!session) throw new Error('No session found');

        const userId = session.user.id;

        const { data: profile } = await supabaseClient
          .from('profiles').select('id').eq('id', userId).single();

        if (!profile) {
          const tempData = localStorage.getItem('ehSignupData');
          if (tempData) {
            await supabaseClient.from('profiles').upsert({
              id: userId,
              ...JSON.parse(tempData)
            });
            localStorage.removeItem('ehSignupData');
          }
        }

        localStorage.removeItem('ehSignupEmail');
        localStorage.removeItem('ehSignupPassword');

        document.getElementById('verifyBox').innerHTML = `
          <div class="verify-emoji">🎉</div>
          <div class="verify-title" style="background: linear-gradient(135deg, #FF1493, #FF6B9D); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Email Verified!</div>
          <div class="verify-sub">Welcome to EntranceHearts! Redirecting you now...</div>
        `;
        setTimeout(() => window.location.href = 'browse.html', 2000);

      } catch(err) {
        document.getElementById('verifyBox').innerHTML = `
          <div class="verify-emoji">❌</div>
          <div class="verify-title">Verification Failed</div>
          <div class="verify-sub">
            ${err.message === 'No session found'
              ? 'This link has expired or already been used.'
              : (err.message || 'Something went wrong.')}
            <br/><br/>Please sign up again or use the code sent to your email.
          </div>
          <a href="signup.html" class="action-btn">Try Again</a>
        `;
      }
    }

    // Mobile Menu
    const menuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (menuBtn && mobileMenu) {
      menuBtn.onclick = () => {
        mobileMenu.classList.toggle('open');
        menuBtn.textContent = mobileMenu.classList.contains('open') ? '✕' : '☰';
      };
      document.addEventListener('click', (e) => {
        if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) {
          mobileMenu.classList.remove('open');
          menuBtn.textContent = '☰';
        }
      });
    }

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (navbar && window.scrollY > 50) navbar.classList.add('scrolled');
      else if (navbar) navbar.classList.remove('scrolled');
    });

    handleVerification();
  </script>
