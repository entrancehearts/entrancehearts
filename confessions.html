<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Confession Wall 💌 - EntranceHearts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
    }

    /* Premium Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 18px 32px;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 20, 147, 0.2);
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar.scrolled {
      padding: 12px 32px;
      background: rgba(10, 10, 15, 0.95);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 100px;
      transition: all 0.3s;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 20, 147, 0.2);
    }
    .back-btn:hover {
      background: rgba(255, 20, 147, 0.15);
      color: #FF6B9D;
      transform: translateX(-3px);
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Hero Banner */
    .hero-banner {
      background: linear-gradient(135deg, rgba(255, 20, 147, 0.15), rgba(255, 107, 157, 0.05));
      border-bottom: 1px solid rgba(255, 20, 147, 0.15);
      padding: 120px 24px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero-banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,20,147,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .hero-banner h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .hero-banner p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.95rem;
      max-width: 500px;
      margin: 0 auto;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 24px;
    }
    .hero-stat {
      text-align: center;
    }
    .hero-stat .number {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-stat .label {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Main Container */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 24px 100px;
    }

    /* Post Form */
    .post-form {
      background: #141423;
      border: 1px solid rgba(255, 20, 147, 0.2);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 30px;
      transition: all 0.3s;
    }
    .post-form textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 20, 147, 0.2);
      border-radius: 16px;
      padding: 16px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 110px;
    }
    .post-form textarea:focus {
      outline: none;
      border-color: #FF1493;
    }
    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .char-count {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.7rem;
    }
    .post-buttons {
      display: flex;
      gap: 10px;
    }
    .post-btn {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none;
      padding: 10px 24px;
      border-radius: 100px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .post-btn:hover {
      transform: scale(1.02);
    }
    .gif-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 20, 147, 0.3);
      padding: 10px 20px;
      border-radius: 100px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .gif-btn:hover {
      background: rgba(255, 20, 147, 0.15);
      color: #FF6B9D;
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 20, 147, 0.2);
      padding: 8px 20px;
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border-color: transparent;
      color: white;
    }

    /* Confessions List */
    .confessions-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .confession-card {
      background: #141423;
      border: 1px solid rgba(255, 20, 147, 0.15);
      border-radius: 24px;
      padding: 22px;
      transition: all 0.3s;
    }
    .confession-card:hover {
      border-color: rgba(255, 20, 147, 0.4);
      transform: translateY(-3px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .anonymous-badge {
      background: rgba(255, 20, 147, 0.12);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.7rem;
      color: #FF6B9D;
    }
    .owner-badge {
      font-size: 0.6rem;
      color: #FF6B9D;
      margin-left: 5px;
    }
    .timestamp {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.35);
    }
    .delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 20px;
    }
    .delete-btn:hover {
      color: #FF1493;
      background: rgba(255, 20, 147, 0.1);
    }
    .confession-text {
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .exam-tag {
      display: inline-block;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 20, 147, 0.2);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.6);
    }
    .like-section {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 20, 147, 0.1);
    }
    .like-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .like-btn:hover {
      color: #FF6B9D;
    }
    .reactions-row {
      display: flex;
      gap: 12px;
      margin: 8px 0;
      flex-wrap: wrap;
    }
    .reaction-display {
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 0.7rem;
    }
    .comments-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 20, 147, 0.1);
    }
    .comment-form {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .comment-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 20, 147, 0.2);
      border-radius: 100px;
      padding: 10px 16px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
    }
    .comment-input:focus {
      outline: none;
      border-color: #FF1493;
    }
    .comment-btn {
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none;
      padding: 8px 20px;
      border-radius: 100px;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }
    .comments-list {
      margin-top: 10px;
    }
    .comment-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 8px 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .comment-text {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
      flex: 1;
    }
    .comment-anonymous {
      font-size: 0.6rem;
      color: #FF6B9D;
      margin-right: 8px;
    }
    .comment-delete {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 0.7rem;
    }
    .comment-delete:hover {
      color: #FF1493;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: #141423;
      border-radius: 24px;
    }
    .empty-state i {
      font-size: 3rem;
      color: #FF6B9D;
      margin-bottom: 16px;
      display: block;
    }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #141423;
      border: 1px solid rgba(255, 20, 147, 0.3);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      z-index: 200;
      display: none;
    }
    .toast.show {
      display: block;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Premium Navbar (Admin Button Removed) -->
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
      <div class="logo">💌 Confession Wall</div>
    </div>
  </nav>

  <!-- Hero Banner -->
  <div class="hero-banner">
    <div class="hero-icon">💌✨</div>
    <h1>Anonymous Confessions</h1>
    <p>Share your feelings, comment anonymously, and connect with aspirants</p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="number" id="totalConfessions">0</div><div class="label">Confessions</div></div>
      <div class="hero-stat"><div class="number" id="totalLikes">0</div><div class="label">Likes</div></div>
      <div class="hero-stat"><div class="number" id="totalComments">0</div><div class="label">Comments</div></div>
    </div>
  </div>

  <div class="container">
    <!-- Post Form -->
    <div class="post-form">
      <textarea id="confessionInput" placeholder="Share your confession, feelings, or thoughts... (Everyone can see this anonymously)"></textarea>
      <div class="form-footer">
        <span class="char-count" id="charCount">0/500</span>
        <div class="post-buttons">
          <button class="post-btn" onclick="postConfession()"><i class="fas fa-paper-plane"></i> Post Confession</button>
          <button class="gif-btn" onclick="openGifPicker()"><i class="fas fa-icons"></i> Add GIF</button>
        </div>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">📌 All</button>
      <button class="filter-btn" data-filter="CEE">🎓 CEE</button>
      <button class="filter-btn" data-filter="IOE">⚙️ IOE</button>
      <button class="filter-btn" data-filter="+2">📚 +2</button>
      <button class="filter-btn" data-filter="Management">💼 Management</button>
    </div>

    <div id="confessionsList" class="confessions-list"></div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- GIF Modal -->
  <div id="gifModal" style="display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#141423; border-radius:28px; padding:28px; max-width:400px; width:90%;">
      <div style="font-size:2rem; text-align:center; margin-bottom:12px;">🎬</div>
      <h3 style="margin-bottom:16px; text-align:center;">Choose a GIF</h3>
      <input type="text" id="gifSearch" placeholder="Search GIFs..." onkeyup="searchGifs(this.value)" style="width:100%; padding:14px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,20,147,0.3); border-radius:14px; color:white; margin-bottom:20px;">
      <div id="gifResults" style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px; max-height:400px; overflow-y:auto; padding:4px;"></div>
      <button onclick="closeGifPicker()" style="margin-top:20px; width:100%; padding:12px; background:transparent; border:1px solid rgba(255,20,147,0.3); border-radius:100px; color:white; cursor:pointer;">Cancel</button>
    </div>
  </div>

  <script>
    let confessions = [];
    let currentUserId = null;
    let expandedComments = {};

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUserId = data.session.user.id;

      
  // ✅ ADD THIS LINE - Fix back button
  const backBtn = document.querySelector('.back-btn');
  if (backBtn) backBtn.href = 'browse.html';
  
  await loadConfessions();
  await updateStats();
    }

    async function loadConfessions() {
      const { data, error } = await supabaseClient
        .from('confessions')
        .select('*')
        .order('created_at', { ascending: false });
      
      if (error) {
        console.error('Error loading confessions:', error);
        return;
      }
      
      confessions = data || [];
      
      for (let confession of confessions) {
        const { data: comments } = await supabaseClient
          .from('confession_comments')
          .select('*')
          .eq('confession_id', confession.id)
          .order('created_at', { ascending: true });
        confession.comments = comments || [];
      }
      
      renderConfessions();
      updateStats();
    }

    async function updateStats() {
      document.getElementById('totalConfessions').innerText = confessions.length;
      const totalLikes = confessions.reduce((sum, c) => sum + (c.likes || 0), 0);
      const totalComments = confessions.reduce((sum, c) => sum + (c.comments?.length || 0), 0);
      document.getElementById('totalLikes').innerText = totalLikes;
      document.getElementById('totalComments').innerText = totalComments;
    }

    async function postConfession() {
      const input = document.getElementById('confessionInput');
      const text = input.value.trim();
      
      if (!text) { showToast('Please write something before posting 💭'); return; }
      if (text.length < 10) { showToast('Write at least 10 characters 🙏'); return; }

      let exam = "All";
      const lowerText = text.toLowerCase();
      if (lowerText.includes("cee") || lowerText.includes("mbbs") || lowerText.includes("medical")) exam = "CEE";
      else if (lowerText.includes("ioe") || lowerText.includes("engineering") || lowerText.includes("pulchowk")) exam = "IOE";
      else if (lowerText.includes("+2") || lowerText.includes("plus two")) exam = "+2";
      else if (lowerText.includes("management") || lowerText.includes("bbs") || lowerText.includes("bba")) exam = "Management";

      const { error } = await supabaseClient.from('confessions').insert({
        text: text,
        exam: exam,
        user_id: currentUserId
      });

      if (error) { showToast('Failed to post confession'); return; }

      input.value = "";
      document.getElementById('charCount').innerText = "0/500";
      showToast('💌 Your confession has been posted anonymously!');
      await loadConfessions();
    }

    async function deleteConfession(id) {
      if (!confirm('Delete this confession?')) return;
      const { error } = await supabaseClient.from('confessions').delete().eq('id', id);
      if (error) { showToast('Failed to delete'); }
      else { showToast('🗑️ Confession deleted'); await loadConfessions(); }
    }

    async function likeConfession(id) {
      const confession = confessions.find(c => c.id === id);
      if (!confession) return;
      
      const { error } = await supabaseClient
        .from('confessions')
        .update({ likes: (confession.likes || 0) + 1 })
        .eq('id', id);
      
      if (!error) {
        confession.likes = (confession.likes || 0) + 1;
        renderConfessions();
      }
    }

    async function addReaction(confessionId, emoji) {
      const confession = confessions.find(c => c.id === confessionId);
      if (!confession) return;
      
      let reactions = confession.reactions || {};
      reactions[emoji] = (reactions[emoji] || 0) + 1;
      
      const { error } = await supabaseClient
        .from('confessions')
        .update({ reactions: reactions })
        .eq('id', confessionId);
      
      if (!error) {
        confession.reactions = reactions;
        renderConfessions();
      }
    }

    async function addComment(confessionId) {
      const input = document.getElementById(`comment-input-${confessionId}`);
      const text = input.value.trim();
      
      if (!text) { showToast('Please write a comment'); return; }
      if (text.length < 2) { showToast('Comment too short'); return; }

      const { error } = await supabaseClient
        .from('confession_comments')
        .insert({
          confession_id: confessionId,
          text: text,
          user_id: currentUserId
        });

      if (error) { showToast('Failed to post comment'); return; }

      input.value = "";
      showToast('💬 Comment added!');
      await loadConfessions();
    }

    async function deleteComment(confessionId, commentId) {
      if (!confirm('Delete this comment?')) return;
      const { error } = await supabaseClient.from('confession_comments').delete().eq('id', commentId);
      if (!error) { showToast('Comment deleted'); await loadConfessions(); }
    }

    function toggleComments(confessionId) {
      expandedComments[confessionId] = !expandedComments[confessionId];
      renderConfessions();
    }

    // GIF Functions - FIXED
    let selectedGifUrl = null;

    function openGifPicker() {
      document.getElementById('gifModal').style.display = 'flex';
      searchGifs('');
    }

    function closeGifPicker() {
      document.getElementById('gifModal').style.display = 'none';
    }

    async function searchGifs(query) {
      const apiKey = 'AIzaSyC9VJpZ8qk8q8q8q8q8q8q8q8q8q8q8';
      let url;
      if (query && query.trim() !== '') {
        url = `https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(query)}&key=${apiKey}&limit=20`;
      } else {
        url = `https://tenor.googleapis.com/v2/trending?key=${apiKey}&limit=20`;
      }
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        const resultsDiv = document.getElementById('gifResults');
        
        if (data.results && data.results.length > 0) {
          resultsDiv.innerHTML = data.results.map(gif => `
            <div onclick="selectGif('${gif.media_formats.gif.url}')" style="cursor:pointer; border-radius:12px; overflow:hidden; transition:transform 0.2s; background:rgba(255,255,255,0.05);">
              <img src="${gif.media_formats.tinygif.url}" style="width:100%; height:auto; display:block;">
            </div>
          `).join('');
        } else {
          resultsDiv.innerHTML = '<p style="text-align:center;padding:20px;color:rgba(255,255,255,0.5);">No GIFs found. Try a different search.</p>';
        }
      } catch(e) {
        console.error('GIF search error:', e);
        document.getElementById('gifResults').innerHTML = '<p style="text-align:center;padding:20px;color:rgba(255,255,255,0.5);">Failed to load GIFs. Please try again.</p>';
      }
    }

    function selectGif(gifUrl) {
      const input = document.getElementById('confessionInput');
      const currentText = input.value;
      input.value = currentText + (currentText ? '\n' : '') + `🎬 GIF: ${gifUrl}`;
      showToast('🎬 GIF added to your confession!');
      closeGifPicker();
    }

    let searchTimeout;
    document.getElementById('gifSearch')?.addEventListener('input', function(e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => searchGifs(e.target.value), 500);
    });

    function renderConfessions() {
      const container = document.getElementById('confessionsList');
      const currentFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
      let filtered = confessions;
      
      if (currentFilter !== "all") {
        filtered = confessions.filter(c => c.exam === currentFilter);
      }

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-comment-dots"></i><p>No confessions yet. Be the first to share your feelings!</p></div>`;
        return;
      }

      container.innerHTML = filtered.map(confession => {
        const commentCount = confession.comments?.length || 0;
        const isExpanded = expandedComments[confession.id];
        const userOwnsConfession = confession.user_id === currentUserId;
        
        let reactionsHtml = '';
        if (confession.reactions && Object.keys(confession.reactions).length > 0) {
          reactionsHtml = `<div class="reactions-row">${Object.entries(confession.reactions).map(([emoji, count]) => `<span class="reaction-display">${emoji} ${count}</span>`).join('')}</div>`;
        }
        
        return `
          <div class="confession-card">
            <div class="card-header">
              <div>
                <span class="anonymous-badge">🕊️ Anonymous ${userOwnsConfession ? '<span class="owner-badge">(Your confession)</span>' : ''}</span>
              </div>
              <div>
                <span class="timestamp">${formatTime(confession.created_at)}</span>
                ${userOwnsConfession ? `<button class="delete-btn" onclick="deleteConfession(${confession.id})"><i class="fas fa-trash"></i> Delete</button>` : ''}
              </div>
            </div>
            <div class="confession-text">${escapeHtml(confession.text)}</div>
            <div><span class="exam-tag">${confession.exam !== "All" ? confession.exam : "General"}</span></div>
            
            <div class="like-section">
              <button class="like-btn" onclick="likeConfession(${confession.id})"><i class="fas fa-heart"></i> ${confession.likes || 0}</button>
              <button class="like-btn" onclick="toggleComments(${confession.id})"><i class="fas fa-comment"></i> ${commentCount} ${commentCount === 1 ? 'Comment' : 'Comments'}</button>
            </div>
            
            <div class="reactions-row">
              <button class="like-btn" onclick="addReaction(${confession.id}, '❤️')">❤️</button>
              <button class="like-btn" onclick="addReaction(${confession.id}, '😂')">😂</button>
              <button class="like-btn" onclick="addReaction(${confession.id}, '😮')">😮</button>
              <button class="like-btn" onclick="addReaction(${confession.id}, '😢')">😢</button>
              <button class="like-btn" onclick="addReaction(${confession.id}, '😡')">😡</button>
            </div>
            
            ${reactionsHtml}
            
            ${isExpanded ? `
              <div class="comments-section">
                <div class="comment-form">
                  <input type="text" id="comment-input-${confession.id}" class="comment-input" placeholder="Write an anonymous comment...">
                  <button class="comment-btn" onclick="addComment(${confession.id})">Post</button>
                </div>
                <div class="comments-list">
                  ${!confession.comments || confession.comments.length === 0 ? '<div style="color:rgba(255,255,255,0.3);font-size:0.7rem;padding:8px;">No comments yet. Be the first to comment 💬</div>' : ''}
                  ${(confession.comments || []).map(comment => {
                    const userOwnsComment = comment.user_id === currentUserId;
                    return `
                      <div class="comment-item">
                        <div style="display:flex;align-items:center;gap:6px;flex:1;">
                          <span class="comment-anonymous">🕊️ Anonymous ${userOwnsComment ? '(You)' : ''}</span>
                          <span class="comment-text">${escapeHtml(comment.text)}</span>
                        </div>
                        ${userOwnsComment ? `<button class="comment-delete" onclick="deleteComment(${confession.id}, ${comment.id})"><i class="fas fa-trash"></i></button>` : ''}
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return "just now";
      if (diff < 3600) return `${Math.floor(diff / 60)} minutes ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} hours ago`;
      return `${Math.floor(diff / 86400)} days ago`;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    document.getElementById('confessionInput').addEventListener('input', function() {
      const count = this.value.length;
      document.getElementById('charCount').innerText = `${count}/500`;
      if (count > 500) {
        this.value = this.value.slice(0, 500);
        document.getElementById('charCount').innerText = "500/500";
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderConfessions();
      });
    });

    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (navbar && window.scrollY > 50) navbar.classList.add('scrolled');
      else if (navbar) navbar.classList.remove('scrolled');
    });

    init();
  </script>
</body>
</html>
