<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Update Password — EntranceHearts 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Animated Background */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      overflow: hidden;
    }
    .floating-heart {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.12;
      animation: floatHeart linear infinite;
      pointer-events: none;
    }
    @keyframes floatHeart {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.12; }
      90% { opacity: 0.12; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
    .gradient-orb {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,20,147,0.12), transparent);
      top: -250px;
      right: -250px;
      animation: glowPulse 6s ease-in-out infinite;
    }
    .gradient-orb-bottom {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,157,0.08), transparent);
      bottom: -250px;
      left: -250px;
      animation: glowPulse 8s ease-in-out infinite reverse;
    }

    .container {
      background: rgba(20, 20, 35, 0.9);
      backdrop-filter: blur(20px);
      padding: 48px 40px;
      border-radius: 40px;
      text-align: center;
      max-width: 450px;
      width: 90%;
      border: 1px solid rgba(255,20,147,0.25);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 0.6s ease-out;
      position: relative;
      z-index: 1;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    h2 {
      margin-bottom: 8px;
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 28px;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 16px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.7);
    }
    .input-group label i {
      margin-right: 6px;
      color: #FF6B9D;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 20, 147, 0.25);
      border-radius: 16px;
      color: white;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
      outline: none;
    }
    input:focus {
      border-color: #FF1493;
      background: rgba(255, 20, 147, 0.08);
      box-shadow: 0 0 0 3px rgba(255, 20, 147, 0.1);
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      background: rgba(255, 255, 255, 0.1);
      width: 0%;
      transition: all 0.3s;
    }
    .strength-text {
      font-size: 0.7rem;
      margin-top: 5px;
      color: rgba(255, 255, 255, 0.5);
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #FF1493, #FF6B9D);
      border: none;
      border-radius: 100px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 20, 147, 0.35);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .error-msg {
      color: #ff6666;
      background: rgba(255, 68, 68, 0.12);
      border: 1px solid rgba(255, 68, 68, 0.3);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.85rem;
      margin-top: 16px;
      display: none;
      text-align: center;
    }
    .success-msg {
      color: #6fbf6f;
      background: rgba(76, 175, 80, 0.12);
      border: 1px solid rgba(76, 175, 80, 0.3);
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.85rem;
      margin-top: 16px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="gradient-orb"></div>
    <div class="gradient-orb-bottom"></div>
  </div>

  <div class="container">
    <div class="icon">🔐</div>
    <h2>Create New Password</h2>
    <p>Enter your new password below</p>
    
    <div class="input-group">
      <label><i class="fas fa-lock"></i> New Password</label>
      <input type="password" id="newPassword" placeholder="Min 8 characters" autocomplete="off" oninput="checkStrength(this.value)">
      <div class="strength-bar" id="strengthBar"></div>
      <div class="strength-text" id="strengthText"></div>
    </div>
    
    <div class="input-group">
      <label><i class="fas fa-check-circle"></i> Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm your password" autocomplete="off">
    </div>
    
    <button onclick="updatePassword()">Update Password</button>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
  </div>

  <script>
    // Floating Hearts Animation
    function createFloatingHearts() {
      const container = document.querySelector('.animated-bg');
      for (let i = 0; i < 25; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = ['💕', '❤️', '💖', '💗', '💓'][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
        heart.style.animationDuration = (Math.random() * 10 + 8) + 's';
        heart.style.animationDelay = Math.random() * 15 + 's';
        container.appendChild(heart);
      }
    }
    createFloatingHearts();

    function checkStrength(val) {
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[^a-zA-Z0-9]/.test(val)) score++;
      
      const colors = ['#ff4444', '#ff9800', '#4caf50', '#4caf50'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];
      const widths = ['25%', '50%', '75%', '100%'];
      
      if (val.length === 0) {
        bar.style.width = '0';
        text.textContent = '';
        return;
      }
      const i = Math.min(score, 3);
      bar.style.background = colors[i];
      bar.style.width = widths[i];
      text.textContent = labels[i];
      text.style.color = colors[i];
    }

    async function updatePassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorDiv = document.getElementById('errorMsg');
      const successDiv = document.getElementById('successMsg');
      
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      if (newPassword.length < 8) {
        errorDiv.textContent = '❌ Password must be at least 8 characters';
        errorDiv.style.display = 'block';
        return;
      }
      if (newPassword !== confirmPassword) {
        errorDiv.textContent = '❌ Passwords do not match';
        errorDiv.style.display = 'block';
        return;
      }
      
      const btn = event.target;
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '<i class="fas fa-spinner fa-spin"></i> Updating...';
      
      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
        if (error) throw error;
        
        successDiv.textContent = '✅ Password updated successfully! Redirecting to login...';
        successDiv.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
        
      } catch (err) {
        errorDiv.textContent = '❌ ' + (err.message || 'Failed to update password');
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    // Enter key support
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') updatePassword();
      });
    });
  </script>
</body>
</html>
