    .floating-heart {

    @keyframes floatHeart {

      10% { opacity: 0.04; }
      90% { opacity: 0.04; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }

    .gradient-orb {

      width: 400px;
      height: 400px;
      border-radius: 50%;

      right: -150px;

    .gradient-orb-bottom {

      height: 400px;

    @keyframes floatOrb {

      50% { transform: translate(20px, -15px); opacity: 0.5; }

<body>

      <div class="input-group">

    <a href="ai-match.html" class="nav-item"><span>🤖</span><span>AI Match</span></a>
    <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
  </div>

  <script>
    // Floating Hearts Animation - Subtle
    function createFloatingHearts() {
      const container = document.querySelector('.animated-bg');
      for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = ['💕', '❤️', '💖', '💗'][Math.floor(Math.random() * 4)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (Math.random() * 1.2 + 0.6) + 'rem';
        heart.style.animationDuration = (Math.random() * 12 + 10) + 's';
        heart.style.animationDelay = Math.random() * 15 + 's';
        container.appendChild(heart);
      }
    }
    createFloatingHearts();

    function checkStrength(val) {
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[^a-zA-Z0-9]/.test(val)) score++;
      
      const colors = ['#ff4444', '#ff9800', '#4caf50', '#4caf50'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];
      const widths = ['25%', '50%', '75%', '100%'];
      
      if (val.length === 0) {
        bar.style.width = '0';
        text.textContent = '';
        return;
      }
      const i = Math.min(score, 3);
      bar.style.background = colors[i];
      bar.style.width = widths[i];
      text.textContent = labels[i];
      text.style.color = colors[i];
    }

    async function updatePassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorDiv = document.getElementById('errorMsg');
      const successDiv = document.getElementById('successMsg');
      
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      if (newPassword.length < 8) {
        errorDiv.textContent = '❌ Password must be at least 8 characters';
        errorDiv.style.display = 'block';
        return;
      }
      if (newPassword !== confirmPassword) {
        errorDiv.textContent = '❌ Passwords do not match';
        errorDiv.style.display = 'block';
        return;
      }
      
      const btn = event.target;
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Updating...';
      
      try {
        const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
        if (error) throw error;
        
        successDiv.textContent = '✅ Password updated successfully! Redirecting to login...';
        successDiv.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
        
      } catch (err) {
        errorDiv.textContent = '❌ ' + (err.message || 'Failed to update password');
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    // Enter key support
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') updatePassword();
      });
    });

    // Mobile Menu
    const menuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (menuBtn && mobileMenu) {
      menuBtn.onclick = () => { mobileMenu.classList.toggle('open'); menuBtn.textContent = mobileMenu.classList.contains('open') ? '✕' : '☰'; };
      document.addEventListener('click', (e) => { if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) { mobileMenu.classList.remove('open'); menuBtn.textContent = '☰'; } });
    }

    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (navbar && window.scrollY > 50) navbar.classList.add('scrolled');
      else if (navbar) navbar.classList.remove('scrolled');
    });
  </script>
