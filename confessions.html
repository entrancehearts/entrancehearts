<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Confession Wall 💌 — EntranceHearts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;}

    /* ── NAVBAR ── */
    .navbar{
      position:fixed;top:0;left:0;right:0;z-index:1000;
      padding:14px 20px;
      background:rgba(10,10,15,0.96);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,20,147,0.12);
      display:flex;justify-content:space-between;align-items:center;
    }
    .logo{
      font-size:1.15rem;font-weight:800;
      background:linear-gradient(135deg,#FF1493,#FF6B9D);
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    /* ── HERO ── */
    .hero-banner{padding:80px 20px 24px;text-align:center;}
    .hero-icon{
      font-size:2.4rem;margin-bottom:10px;display:inline-block;
      animation:gentleFloat 3s ease-in-out infinite;
    }
    @keyframes gentleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .hero-banner h1{
      font-size:1.6rem;font-weight:800;
      background:linear-gradient(135deg,#FF1493,#FF6B9D);
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .hero-banner p{color:rgba(255,255,255,0.4);font-size:0.78rem;margin-top:4px;}
    .hero-stats{display:flex;justify-content:center;gap:28px;margin-top:18px;}
    .hero-stat{text-align:center;}
    .hero-stat .number{
      font-size:1.5rem;font-weight:800;
      background:linear-gradient(135deg,#FF1493,#FF6B9D);
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;
      transition:all 0.3s;
    }
    .hero-stat .label{font-size:0.63rem;color:rgba(255,255,255,0.35);}

    /* ── MAIN ── */
    .container{max-width:640px;margin:0 auto;padding:20px 16px 100px;}

    /* ── POST FORM ── */
    .post-form{
      background:rgba(18,18,28,0.9);
      border:1px solid rgba(255,20,147,0.18);
      border-radius:24px;padding:20px;margin-bottom:22px;
      transition:border-color 0.2s;
    }
    .post-form:focus-within{border-color:rgba(255,20,147,0.4);}
    .anon-note{
      display:flex;align-items:center;gap:6px;
      font-size:0.7rem;color:rgba(255,255,255,0.35);
      margin-bottom:10px;
    }
    .anon-dot{
      width:6px;height:6px;border-radius:50%;
      background:#FF1493;flex-shrink:0;
      animation:blink 1.5s infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .post-form textarea{
      width:100%;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,20,147,0.15);
      border-radius:16px;padding:14px;
      color:white;font-family:'Inter',sans-serif;
      font-size:0.88rem;resize:none;min-height:100px;
      outline:none;line-height:1.6;transition:border-color 0.2s;
    }
    .post-form textarea:focus{
      border-color:rgba(255,20,147,0.5);
      background:rgba(255,20,147,0.04);
    }
    .post-form textarea::placeholder{color:rgba(255,255,255,0.25);}
    .form-footer{
      display:flex;justify-content:space-between;
      align-items:center;margin-top:12px;flex-wrap:wrap;gap:10px;
    }
    .char-count{font-size:0.68rem;color:rgba(255,255,255,0.35);}
    .char-count.warn{color:#FF6B9D;}
    .post-btn{
      padding:9px 22px;border-radius:50px;
      background:linear-gradient(135deg,#FF1493,#FF6B9D);
      border:none;color:white;font-size:0.82rem;font-weight:600;
      cursor:pointer;font-family:'Inter',sans-serif;
      transition:all 0.2s;display:flex;align-items:center;gap:6px;
    }
    .post-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,20,147,0.35);}
    .post-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    /* ── FILTER TABS ── */
    .filter-tabs{
      display:flex;gap:8px;margin-bottom:20px;
      overflow-x:auto;padding-bottom:6px;
    }
    .filter-tabs::-webkit-scrollbar{height:2px;}
    .filter-tabs::-webkit-scrollbar-thumb{background:#FF1493;border-radius:10px;}
    .filter-btn{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,20,147,0.15);
      padding:7px 16px;border-radius:50px;
      color:rgba(255,255,255,0.55);font-size:0.72rem;
      white-space:nowrap;cursor:pointer;font-family:'Inter',sans-serif;
      transition:all 0.2s;
    }
    .filter-btn.active{
      background:linear-gradient(135deg,#FF1493,#FF6B9D);
      border-color:transparent;color:white;font-weight:600;
    }

    /* ── CONFESSION CARD ── */
    .confessions-list{display:flex;flex-direction:column;gap:16px;}
    .confession-card{
      background:rgba(18,18,28,0.9);
      border:1px solid rgba(255,20,147,0.1);
      border-radius:22px;padding:18px;
      transition:border-color 0.25s,transform 0.2s;
      animation:slideIn 0.3s ease;
    }
    @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .confession-card:hover{border-color:rgba(255,20,147,0.22);}

    .card-header{
      display:flex;justify-content:space-between;
      align-items:flex-start;margin-bottom:12px;gap:8px;
    }
    .anon-badge{
      display:inline-flex;align-items:center;gap:5px;
      background:rgba(255,20,147,0.1);
      border:1px solid rgba(255,20,147,0.2);
      padding:4px 12px;border-radius:50px;
      font-size:0.68rem;color:#FF6B9D;font-weight:500;
    }
    .owner-chip{
      background:rgba(255,20,147,0.2);
      color:#FF1493;font-size:0.58rem;
      padding:1px 7px;border-radius:20px;margin-left:4px;
    }
    .card-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .timestamp{font-size:0.6rem;color:rgba(255,255,255,0.3);}
    .delete-btn{
      background:none;border:none;color:rgba(255,255,255,0.25);
      cursor:pointer;font-size:0.65rem;padding:4px 8px;
      border-radius:20px;transition:all 0.2s;
    }
    .delete-btn:hover{color:#FF1493;background:rgba(255,20,147,0.1);}

    .confession-text{
      font-size:0.88rem;line-height:1.6;
      color:rgba(255,255,255,0.88);
      margin-bottom:12px;word-break:break-word;
    }
    .exam-tag{
      display:inline-block;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,20,147,0.18);
      padding:3px 12px;border-radius:50px;
      font-size:0.63rem;color:rgba(255,255,255,0.5);
    }

    /* ── REACTIONS ── */
    .reaction-row{
      display:flex;align-items:center;gap:6px;
      margin-top:12px;flex-wrap:wrap;
    }
    .react-btn{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:50px;padding:5px 10px;
      font-size:0.82rem;cursor:pointer;
      transition:all 0.15s;display:flex;align-items:center;gap:3px;
    }
    .react-btn:hover{
      background:rgba(255,20,147,0.1);
      border-color:rgba(255,20,147,0.3);
      transform:scale(1.08);
    }
    .react-btn.reacted{
      background:rgba(255,20,147,0.15);
      border-color:rgba(255,20,147,0.4);
    }
    .react-count{font-size:0.7rem;color:rgba(255,255,255,0.5);}

    /* ── ACTION BAR ── */
    .action-bar{
      display:flex;align-items:center;gap:6px;
      margin-top:12px;padding-top:12px;
      border-top:1px solid rgba(255,20,147,0.07);
      flex-wrap:wrap;
    }
    .action-btn{
      background:none;border:none;
      color:rgba(255,255,255,0.4);cursor:pointer;
      font-size:0.78rem;display:flex;align-items:center;gap:5px;
      padding:5px 10px;border-radius:30px;
      font-family:'Inter',sans-serif;transition:all 0.2s;
    }
    .action-btn:hover{color:#FF6B9D;background:rgba(255,20,147,0.08);}
    .action-btn.liked{color:#FF1493;}

    /* ── COMMENTS ── */
    .comments-section{
      margin-top:14px;padding-top:12px;
      border-top:1px solid rgba(255,20,147,0.07);
    }
    .comment-form{display:flex;gap:8px;margin-bottom:12px;}
    .comment-input{
      flex:1;background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,20,147,0.18);
      border-radius:50px;padding:8px 16px;
      color:white;font-size:0.75rem;
      font-family:'Inter',sans-serif;outline:none;
      transition:border-color 0.2s;
    }
    .comment-input:focus{border-color:#FF1493;}
    .comment-input::placeholder{color:rgba(255,255,255,0.22);}
    .comment-post-btn{
      background:linear-gradient(135deg,#FF1493,#FF6B9D);
      border:none;padding:7px 16px;border-radius:50px;
      color:white;font-size:0.72rem;font-weight:600;
      cursor:pointer;font-family:'Inter',sans-serif;
      white-space:nowrap;
    }
    .comments-list{display:flex;flex-direction:column;gap:6px;}
    .comment-item{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:14px;padding:9px 12px;
      display:flex;align-items:flex-start;gap:8px;
    }
    .comment-body{flex:1;min-width:0;}
    .comment-meta{
      font-size:0.6rem;color:#FF6B9D;margin-bottom:2px;
      display:flex;align-items:center;gap:6px;
    }
    .comment-time{color:rgba(255,255,255,0.3);}
    .comment-text{font-size:0.75rem;color:rgba(255,255,255,0.75);line-height:1.5;}
    .comment-del{
      background:none;border:none;color:rgba(255,255,255,0.2);
      cursor:pointer;font-size:0.62rem;flex-shrink:0;
      padding:3px 6px;border-radius:10px;
    }
    .comment-del:hover{color:#FF1493;background:rgba(255,20,147,0.1);}
    .no-comments{
      font-size:0.68rem;color:rgba(255,255,255,0.25);
      text-align:center;padding:8px;
    }

    /* ── EMPTY / LOADING ── */
    .empty-state{
      text-align:center;padding:50px 20px;
      background:rgba(18,18,28,0.8);
      border-radius:22px;border:1px solid rgba(255,20,147,0.1);
    }
    .empty-state i{font-size:2.2rem;color:#FF6B9D;margin-bottom:12px;display:block;opacity:0.5;}
    .empty-state p{color:rgba(255,255,255,0.35);font-size:0.82rem;}
    .loading-card{
      background:rgba(18,18,28,0.8);
      border:1px solid rgba(255,20,147,0.08);
      border-radius:22px;padding:20px;
      animation:shimmer 1.5s infinite;
    }
    @keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:1}}
    .shimmer-line{
      height:12px;border-radius:6px;
      background:rgba(255,255,255,0.05);margin-bottom:10px;
    }

    /* ── LIVE BADGE ── */
    .live-badge{
      display:inline-flex;align-items:center;gap:5px;
      background:rgba(255,20,147,0.12);
      border:1px solid rgba(255,20,147,0.25);
      color:#FF6B9D;font-size:0.65rem;font-weight:600;
      padding:3px 10px;border-radius:50px;
    }
    .live-dot{
      width:5px;height:5px;border-radius:50%;
      background:#FF1493;animation:blink 1s infinite;
    }

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:92px;left:50%;transform:translateX(-50%);
      background:#13131f;border:1px solid rgba(255,20,147,0.3);
      padding:10px 22px;border-radius:50px;
      font-size:0.78rem;z-index:9999;display:none;
      white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.5);
    }
    .toast.show{display:block;animation:fadeUp 0.25s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* ── BOTTOM NAV ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:rgba(10,10,15,0.97);
      backdrop-filter:blur(20px);
      border-top:1px solid rgba(255,20,147,0.1);
      display:flex;justify-content:space-around;
      padding:8px 0 18px;z-index:100;
    }
    .nav-item{
      display:flex;flex-direction:column;align-items:center;gap:3px;
      color:rgba(255,255,255,0.35);text-decoration:none;
      font-size:0.58rem;font-weight:600;
      padding:5px 12px;border-radius:30px;transition:all 0.2s;
    }
    .nav-item span:first-child{font-size:1.2rem;}
    .nav-item:hover,.nav-item.active{color:#FF6B9D;}

    @media(max-width:550px){
      .hero-banner{padding:68px 16px 18px;}
      .hero-banner h1{font-size:1.3rem;}
      .container{padding:16px 12px 100px;}
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">💌 Confession Wall</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    </div>
  </nav>

  <div class="hero-banner">
    <div class="hero-icon">💌</div>
    <h1>Anonymous Confessions</h1>
    <p>No login needed — share freely, react honestly</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="number" id="totalConfessions">0</div>
        <div class="label">Confessions</div>
      </div>
      <div class="hero-stat">
        <div class="number" id="totalLikes">0</div>
        <div class="label">Reactions</div>
      </div>
      <div class="hero-stat">
        <div class="number" id="totalComments">0</div>
        <div class="label">Comments</div>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- POST FORM -->
    <div class="post-form">
      <div class="anon-note">
        <div class="anon-dot"></div>
        Posting as Anonymous — no account needed
      </div>
      <textarea id="confessionInput" maxlength="500"
        placeholder="Share a confession, feeling, or secret... 💌"></textarea>
      <div class="form-footer">
        <span class="char-count" id="charCount">0 / 500</span>
        <button class="post-btn" id="postBtn" onclick="postConfession()">
          <i class="fas fa-paper-plane"></i> Post Anonymously
        </button>
      </div>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">📌 All</button>
      <button class="filter-btn" data-filter="CEE">🎓 CEE</button>
      <button class="filter-btn" data-filter="IOE">⚙️ IOE</button>
      <button class="filter-btn" data-filter="+2">📚 +2</button>
      <button class="filter-btn" data-filter="Management">💼 Management</button>
    </div>

    <div id="confessionsList" class="confessions-list">
      <!-- Loading shimmer -->
      <div class="loading-card">
        <div class="shimmer-line" style="width:40%"></div>
        <div class="shimmer-line" style="width:90%"></div>
        <div class="shimmer-line" style="width:70%"></div>
      </div>
      <div class="loading-card">
        <div class="shimmer-line" style="width:35%"></div>
        <div class="shimmer-line" style="width:85%"></div>
        <div class="shimmer-line" style="width:60%"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div class="bottom-nav">
    <a href="browse.html" class="nav-item"><span>🔥</span><span>Discover</span></a>
    <a href="chat.html" class="nav-item"><span>💬</span><span>Chats</span></a>
    <a href="confessions.html" class="nav-item active"><span>💌</span><span>Wall</span></a>
    <a href="ai-match.html" class="nav-item"><span>🤖</span><span>AI Match</span></a>
    <a href="profile.html" class="nav-item"><span>👤</span><span>Profile</span></a>
  </div>

<script>
  /* ── ANONYMOUS ID ── */
  // Give each visitor a persistent anonymous ID stored in localStorage
  // No login needed for any feature
  function getAnonId() {
    let id = localStorage.getItem('eh_anon_id');
    if (!id) {
      id = 'anon_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('eh_anon_id', id);
    }
    return id;
  }
  const ANON_ID = getAnonId();

  /* ── STATE ── */
  let confessions = [];
  let myReactions = JSON.parse(localStorage.getItem('eh_reactions') || '{}');
  let myLikes     = JSON.parse(localStorage.getItem('eh_likes') || '{}');
  let expandedIds = {};
  let currentFilter = 'all';

  /* ── REALTIME SUBSCRIPTION ── */
  function subscribeRealtime() {
    supabaseClient.channel('confessions-rt')
      .on('postgres_changes', { event:'*', schema:'public', table:'confessions' },
        () => loadConfessions())
      .on('postgres_changes', { event:'*', schema:'public', table:'confession_comments' },
        () => loadConfessions())
      .subscribe();
  }

  /* ── LOAD ── */
  async function loadConfessions() {
    const { data, error } = await supabaseClient
      .from('confessions')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('confessionsList').innerHTML =
        `<div class="empty-state"><i class="fas fa-exclamation-circle"></i>
         <p>Could not load confessions. Check your Supabase setup.</p></div>`;
      return;
    }

    // Load comments for all confessions in one query
    const ids = (data || []).map(c => c.id);
    let commentsMap = {};
    if (ids.length) {
      const { data: comments } = await supabaseClient
        .from('confession_comments')
        .select('*')
        .in('confession_id', ids)
        .order('created_at', { ascending: true });
      (comments || []).forEach(c => {
        if (!commentsMap[c.confession_id]) commentsMap[c.confession_id] = [];
        commentsMap[c.confession_id].push(c);
      });
    }

    confessions = (data || []).map(c => ({
      ...c,
      comments: commentsMap[c.id] || []
    }));

    updateStats();
    renderAll();
  }

  /* ── STATS ── */
  function updateStats() {
    document.getElementById('totalConfessions').textContent = confessions.length;
    const totalReactions = confessions.reduce((s, c) => {
      const r = c.reactions || {};
      return s + Object.values(r).reduce((a, b) => a + b, 0);
    }, 0);
    const totalComments = confessions.reduce((s, c) => s + (c.comments?.length || 0), 0);
    document.getElementById('totalLikes').textContent = totalReactions;
    document.getElementById('totalComments').textContent = totalComments;
  }

  /* ── POST ── */
  async function postConfession() {
    const input = document.getElementById('confessionInput');
    const btn   = document.getElementById('postBtn');
    const text  = input.value.trim();

    if (text.length < 5) { showToast('✏️ Write at least 5 characters'); return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Posting...';

    // Auto-detect exam tag
    let exam = 'General';
    const t = text.toLowerCase();
    if (t.includes('cee') || t.includes('mbbs') || t.includes('medical')) exam = 'CEE';
    else if (t.includes('ioe') || t.includes('engineering') || t.includes('pulchowk')) exam = 'IOE';
    else if (t.includes('+2') || t.includes('plus two') || t.includes('slc') || t.includes('see')) exam = '+2';
    else if (t.includes('management') || t.includes('bbs') || t.includes('bba')) exam = 'Management';

    const { error } = await supabaseClient.from('confessions').insert({
      text,
      exam,
      anon_id: ANON_ID,
      likes: 0,
      reactions: {}
    });

    if (error) {
      showToast('❌ Failed to post. Try again.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Post Anonymously';
      return;
    }

    input.value = '';
    document.getElementById('charCount').textContent = '0 / 500';
    showToast('💌 Posted anonymously!');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Post Anonymously';
    // realtime will auto-reload, but also load manually as fallback
    await loadConfessions();
  }

  /* ── LIKE (heart button) ── */
  async function likeConfession(id) {
    const c = confessions.find(c => c.id === id);
    if (!c) return;

    if (myLikes[id]) {
      showToast('❤️ Already liked!');
      return;
    }

    myLikes[id] = true;
    localStorage.setItem('eh_likes', JSON.stringify(myLikes));

    const newLikes = (c.likes || 0) + 1;
    await supabaseClient.from('confessions').update({ likes: newLikes }).eq('id', id);
    c.likes = newLikes;
    renderAll();
  }

  /* ── REACT (emoji buttons) ── */
  async function addReaction(id, emoji) {
    const key = `${id}_${emoji}`;
    if (myReactions[key]) {
      showToast(`Already reacted with ${emoji}`);
      return;
    }

    const c = confessions.find(c => c.id === id);
    if (!c) return;

    myReactions[key] = true;
    localStorage.setItem('eh_reactions', JSON.stringify(myReactions));

    const reactions = { ...(c.reactions || {}) };
    reactions[emoji] = (reactions[emoji] || 0) + 1;

    await supabaseClient.from('confessions').update({ reactions }).eq('id', id);
    c.reactions = reactions;
    updateStats();
    renderAll();
    showToast(`${emoji} Reacted!`);
  }

  /* ── DELETE CONFESSION ── */
  async function deleteConfession(id) {
    const c = confessions.find(c => c.id === id);
    if (!c || c.anon_id !== ANON_ID) { showToast('❌ Not your confession'); return; }
    if (!confirm('Delete this confession?')) return;
    await supabaseClient.from('confession_comments').delete().eq('confession_id', id);
    await supabaseClient.from('confessions').delete().eq('id', id);
    showToast('🗑️ Deleted');
    await loadConfessions();
  }

  /* ── COMMENT ── */
  async function addComment(confessionId) {
    const input = document.getElementById(`ci-${confessionId}`);
    const text  = input.value.trim();
    if (text.length < 2) { showToast('Write at least 2 characters'); return; }

    const btn = document.getElementById(`cb-${confessionId}`);
    btn.disabled = true;

    const { error } = await supabaseClient.from('confession_comments').insert({
      confession_id: confessionId,
      text,
      anon_id: ANON_ID
    });

    if (error) { showToast('❌ Comment failed'); btn.disabled = false; return; }
    input.value = '';
    btn.disabled = false;
    showToast('💬 Comment posted!');
    await loadConfessions();
  }

  /* ── DELETE COMMENT ── */
  async function deleteComment(confessionId, commentId, anonId) {
    if (anonId !== ANON_ID) { showToast('❌ Not your comment'); return; }
    await supabaseClient.from('confession_comments').delete().eq('id', commentId);
    showToast('🗑️ Comment deleted');
    await loadConfessions();
  }

  /* ── TOGGLE COMMENTS ── */
  function toggleComments(id) {
    expandedIds[id] = !expandedIds[id];
    renderAll();
    if (expandedIds[id]) {
      setTimeout(() => {
        const el = document.getElementById(`ci-${id}`);
        if (el) el.focus();
      }, 100);
    }
  }

  /* ── RENDER ── */
  function renderAll() {
    const container = document.getElementById('confessionsList');
    let filtered = currentFilter === 'all'
      ? confessions
      : confessions.filter(c => c.exam === currentFilter);

    if (!filtered.length) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-comment-dots"></i>
          <p>No confessions yet${currentFilter !== 'all' ? ' in this category' : ''}.<br/>Be the first to share!</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(c => renderCard(c)).join('');
  }

  function renderCard(c) {
    const isOwner  = c.anon_id === ANON_ID;
    const expanded = expandedIds[c.id];
    const liked    = myLikes[c.id];
    const reactions = c.reactions || {};
    const comments  = c.comments  || [];

    /* Reactions display */
    const EMOJIS = ['❤️','😂','😮','😢','🔥','😍'];
    const reactBtns = EMOJIS.map(e => {
      const cnt     = reactions[e] || 0;
      const reacted = myReactions[`${c.id}_${e}`];
      return `<button class="react-btn ${reacted ? 'reacted' : ''}"
        onclick="addReaction('${c.id}','${e}')">
        ${e}${cnt > 0 ? `<span class="react-count">${cnt}</span>` : ''}
      </button>`;
    }).join('');

    /* Comments HTML */
    const commentsHtml = expanded ? `
      <div class="comments-section">
        <div class="comment-form">
          <input type="text" id="ci-${c.id}" class="comment-input"
            placeholder="Write anonymously..."
            onkeypress="if(event.key==='Enter') addComment('${c.id}')"/>
          <button id="cb-${c.id}" class="comment-post-btn"
            onclick="addComment('${c.id}')">Send</button>
        </div>
        <div class="comments-list">
          ${comments.length === 0
            ? '<div class="no-comments">No comments yet — be first!</div>'
            : comments.map(cmt => `
              <div class="comment-item">
                <div class="comment-body">
                  <div class="comment-meta">
                    <span>🕊️ Anonymous${cmt.anon_id === ANON_ID ? ' <span style="background:rgba(255,20,147,0.2);padding:1px 6px;border-radius:10px;font-size:0.55rem;">You</span>' : ''}</span>
                    <span class="comment-time">${formatTime(cmt.created_at)}</span>
                  </div>
                  <div class="comment-text">${escapeHtml(cmt.text)}</div>
                </div>
                ${cmt.anon_id === ANON_ID
                  ? `<button class="comment-del"
                      onclick="deleteComment('${c.id}','${cmt.id}','${cmt.anon_id}')">
                      <i class="fas fa-trash"></i></button>`
                  : ''}
              </div>`).join('')}
        </div>
      </div>` : '';

    const totalReactions = Object.values(reactions).reduce((a,b) => a+b, 0);

    return `
      <div class="confession-card" id="card-${c.id}">
        <div class="card-header">
          <div class="anon-badge">
            🕊️ Anonymous
            ${isOwner ? '<span class="owner-chip">You</span>' : ''}
          </div>
          <div class="card-meta">
            <span class="timestamp" id="ts-${c.id}" data-time="${c.created_at}">
              ${formatTime(c.created_at)}
            </span>
            ${isOwner
              ? `<button class="delete-btn" onclick="deleteConfession('${c.id}')">
                   <i class="fas fa-trash"></i></button>`
              : ''}
          </div>
        </div>

        <div class="confession-text">${escapeHtml(c.text)}</div>
        <div><span class="exam-tag">${c.exam || 'General'}</span></div>

        <!-- Emoji reactions -->
        <div class="reaction-row">${reactBtns}</div>

        <!-- Action bar -->
        <div class="action-bar">
          <button class="action-btn ${liked ? 'liked' : ''}"
            onclick="likeConfession('${c.id}')">
            <i class="fas fa-heart"></i>
            ${c.likes || 0} Likes
          </button>
          <button class="action-btn" onclick="toggleComments('${c.id}')">
            <i class="fas fa-comment"></i>
            ${comments.length} Comment${comments.length !== 1 ? 's' : ''}
            <i class="fas fa-chevron-${expanded ? 'up' : 'down'}"
              style="font-size:0.6rem;opacity:0.5"></i>
          </button>
          ${totalReactions > 0
            ? `<span style="font-size:0.68rem;color:rgba(255,255,255,0.3);margin-left:auto">
               ${totalReactions} reaction${totalReactions !== 1 ? 's' : ''}</span>`
            : ''}
        </div>

        ${commentsHtml}
      </div>`;
  }

  /* ── FORMAT TIME (real-time updating) ── */
  function formatTime(iso) {
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 10)  return 'just now';
    if (diff < 60)  return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    const days = Math.floor(diff/86400);
    if (days < 7) return `${days}d ago`;
    return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  /* Update all timestamps every 30 seconds */
  setInterval(() => {
    document.querySelectorAll('[id^="ts-"]').forEach(el => {
      const iso = el.dataset.time;
      if (iso) el.textContent = formatTime(iso);
    });
  }, 30000);

  function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  /* ── CHAR COUNT ── */
  document.getElementById('confessionInput').addEventListener('input', function() {
    const len = this.value.length;
    const el  = document.getElementById('charCount');
    el.textContent = `${len} / 500`;
    el.classList.toggle('warn', len > 400);
  });

  /* ── FILTER TABS ── */
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderAll();
    });
  });

  /* ── INIT ── */
  subscribeRealtime();
  loadConfessions();
</script>
</body>
</html>
