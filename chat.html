  <script>
    let currentUserId = null;
    let currentChatPartner = null;
    let messagesSubscription = null;
    let onlineStatusInterval = null;
    let userStatuses = {};

    async function logout() {
      if (confirm('Logout?')) {
        await supabaseClient.auth.signOut();
        window.location.href = 'index.html';
      }
    }

    async function init() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) { window.location.href = 'login.html'; return; }
      currentUserId = data.session.user.id;

      // Check admin
      const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', currentUserId).single();
      if (profile?.role === 'admin') {
        document.getElementById('adminBtn').style.display = 'inline-flex';
        document.getElementById('mobileAdminBtn').style.display = 'block';
      }

      // Update online status
      await updateOnlineStatus(true);
      onlineStatusInterval = setInterval(() => updateOnlineStatus(true), 30000);
      window.addEventListener('beforeunload', () => updateOnlineStatus(false));

      await loadChats();
    }

    async function updateOnlineStatus(isOnline) {
      await supabaseClient.from('profiles').update({ last_seen: isOnline ? new Date().toISOString() : null }).eq('id', currentUserId);
    }

    async function loadChats() {
      // Get all users that current user has matched with (mutual likes)
      const { data: myLikes } = await supabaseClient.from('likes').select('to_user').eq('from_user', currentUserId);
      const likedIds = myLikes?.map(l => l.to_user) || [];
      
      if (likedIds.length === 0) {
        document.getElementById('chatListContainer').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-comments"></i>
            <p>No matches yet. Start liking profiles to start chatting!</p>
            <a href="browse.html">Discover Matches →</a>
          </div>`;
        return;
      }
      
      const { data: mutual } = await supabaseClient.from('likes').select('from_user').eq('to_user', currentUserId).in('from_user', likedIds);
      const matchedIds = mutual?.map(m => m.from_user) || [];
      
      if (matchedIds.length === 0) {
        document.getElementById('chatListContainer').innerHTML = `
          <div class="empty-state">
            <i class="fas fa-heart-broken"></i>
            <p>No mutual matches yet. Keep swiping!</p>
            <a href="browse.html">Find Matches →</a>
          </div>`;
        return;
      }
      
      // Get profiles of matched users
      const { data: profiles } = await supabaseClient.from('profiles').select('id, name, avatar_url').in('id', matchedIds);
      
      // Get last message for each chat
      const chats = await Promise.all(profiles.map(async (profile) => {
        const { data: lastMsg } = await supabaseClient
          .from('messages')
          .select('*')
          .or(`from_user.eq.${currentUserId},to_user.eq.${currentUserId}`)
          .or(`from_user.eq.${profile.id},to_user.eq.${profile.id}`)
          .order('created_at', { ascending: false })
          .limit(1);
        
        return {
          ...profile,
          lastMessage: lastMsg?.[0]?.text || 'No messages yet',
          lastTime: lastMsg?.[0]?.created_at,
          unread: 0 // Implement unread count if needed
        };
      }));
      
      chats.sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime));
      
      document.getElementById('chatListContainer').innerHTML = chats.map(chat => `
        <div class="chat-card" onclick="openChat('${chat.id}', '${escapeHtml(chat.name || 'User')}', '${chat.avatar_url || ''}')">
          <div class="chat-avatar">
            ${chat.avatar_url ? `<img src="${chat.avatar_url}" onerror="this.style.display='none'; this.parentElement.innerHTML='👤'">` : '👤'}
          </div>
          <div class="chat-info">
            <div class="chat-name">
              ${escapeHtml(chat.name || 'User')}
              <span class="${userStatuses[chat.id] === 'online' ? 'online-dot' : 'offline-dot'}"></span>
            </div>
            <div class="chat-last-msg">${escapeHtml(chat.lastMessage.substring(0, 50))}</div>
          </div>
          <div class="chat-time">${formatChatTime(chat.lastTime)}</div>
        </div>
      `).join('');
      
      // Load online statuses
      loadOnlineStatuses(matchedIds);
    }

    async function loadOnlineStatuses(userIds) {
      const { data } = await supabaseClient.from('profiles').select('id, last_seen').in('id', userIds);
      data.forEach(user => {
        userStatuses[user.id] = user.last_seen ? 'online' : 'offline';
      });
    }

    function formatChatTime(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000 / 60);
      if (diff < 1) return 'just now';
      if (diff < 60) return `${diff}m`;
      if (diff < 1440) return `${Math.floor(diff / 60)}h`;
      return date.toLocaleDateString();
    }

    function openChat(userId, userName, userAvatar) {
      currentChatPartner = { id: userId, name: userName, avatar: userAvatar };
      document.getElementById('chatListContainer').style.display = 'none';
      document.querySelector('.hero-banner').style.display = 'none';
      document.querySelector('.back-footer').style.display = 'none';
      
      const chatWindow = document.createElement('div');
      chatWindow.className = 'chat-window';
      chatWindow.id = 'chatWindow';
      chatWindow.innerHTML = `
        <div class="chat-header">
          <button class="chat-back" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
          <div class="chat-header-avatar">
            ${userAvatar ? `<img src="${userAvatar}" onerror="this.style.display='none'; this.parentElement.innerHTML='👤'">` : '👤'}
          </div>
          <div class="chat-header-info">
            <div class="chat-header-name">${escapeHtml(userName)}</div>
            <div class="chat-header-status" id="partnerStatus">Loading...</div>
          </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="voice-btn" onclick="startVoiceMessage()"><i class="fas fa-microphone"></i></button>
          <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
      `;
      document.body.appendChild(chatWindow);
      
      loadMessages();
      loadPartnerStatus();
      subscribeToMessages();
    }

    function closeChat() {
      if (messagesSubscription) messagesSubscription.unsubscribe();
      document.getElementById('chatWindow')?.remove();
      document.getElementById('chatListContainer').style.display = 'flex';
      document.querySelector('.hero-banner').style.display = 'block';
      document.querySelector('.back-footer').style.display = 'block';
      currentChatPartner = null;
    }

    async function loadPartnerStatus() {
      const { data } = await supabaseClient.from('profiles').select('last_seen').eq('id', currentChatPartner.id).single();
      const statusEl = document.getElementById('partnerStatus');
      if (statusEl) {
        statusEl.innerHTML = data?.last_seen ? '🟢 Online' : '⚫ Offline';
      }
    }

    async function loadMessages() {
      const { data, error } = await supabaseClient
        .from('messages')
        .select('*')
        .or(`from_user.eq.${currentUserId},to_user.eq.${currentUserId}`)
        .or(`from_user.eq.${currentChatPartner.id},to_user.eq.${currentChatPartner.id}`)
        .order('created_at', { ascending: true });
      
      if (error) { showToast('Error loading messages'); return; }
      
      const messagesArea = document.getElementById('messagesArea');
      if (messagesArea) {
        messagesArea.innerHTML = data.map(msg => `
          <div class="message ${msg.from_user === currentUserId ? 'sent' : 'received'}">
            ${escapeHtml(msg.text)}
            <div class="message-time">${formatTime(msg.created_at)}</div>
          </div>
        `).join('');
        messagesArea.scrollTop = messagesArea.scrollHeight;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;
      
      const { error } = await supabaseClient.from('messages').insert({
        from_user: currentUserId,
        to_user: currentChatPartner.id,
        text: text
      });
      
      if (error) { showToast('Failed to send'); return; }
      input.value = '';
      loadMessages();
    }

    function subscribeToMessages() {
      if (messagesSubscription) messagesSubscription.unsubscribe();
      
      messagesSubscription = supabaseClient
        .channel('messages')
        .on('postgres_changes', { 
          event: 'INSERT', 
          schema: 'public', 
          table: 'messages',
          filter: `to_user=eq.${currentUserId}` 
        }, (payload) => {
          if (payload.new.from_user === currentChatPartner?.id) {
            loadMessages();
          }
        })
        .subscribe();
    }

    async function startVoiceMessage() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast('Voice recording not supported on this device');
        return;
      }
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mediaRecorder = new MediaRecorder(stream);
        let audioChunks = [];
        
        mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const fileName = `voice_${Date.now()}.webm`;
          const filePath = `${currentUserId}/${fileName}`;
          
          const { error: uploadError } = await supabaseClient.storage.from('chat_voice').upload(filePath, audioBlob);
          if (uploadError) { showToast('Failed to upload voice'); return; }
          
          const { data: urlData } = supabaseClient.storage.from('chat_voice').getPublicUrl(filePath);
          
          await supabaseClient.from('messages').insert({
            from_user: currentUserId,
            to_user: currentChatPartner.id,
            text: `🎤 Voice message: ${urlData.publicUrl}`,
            is_voice: true,
            voice_url: urlData.publicUrl
          });
          
          showToast('Voice message sent!');
          loadMessages();
          stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        setTimeout(() => mediaRecorder.stop(), 5000);
        showToast('Recording... (5 seconds max)');
      } catch(err) { showToast('Microphone access denied'); }
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

    // Mobile Menu
    const menuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (menuBtn && mobileMenu) {
      menuBtn.onclick = () => { mobileMenu.classList.toggle('open'); menuBtn.textContent = mobileMenu.classList.contains('open') ? '✕' : '☰'; };
      document.addEventListener('click', (e) => { if (!mobileMenu.contains(e.target) && !menuBtn.contains(e.target)) { mobileMenu.classList.remove('open'); menuBtn.textContent = '☰'; } });
    }

    init();
  </script>
</body>
</html>
